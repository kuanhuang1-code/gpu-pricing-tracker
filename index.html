<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPU Pricing Tracker</title>
<script src="https://cdn.plot.ly/plotly-2.35.0.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f1117;color:#fafafa;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
.container{max-width:1400px;margin:0 auto;padding:20px}
h1{font-size:2rem;margin-bottom:4px}
.caption{color:#9ca3af;font-size:0.85rem;margin-bottom:24px}
.metrics{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:28px}
.metric-card{background:#1a1c23;border-radius:10px;padding:16px 20px;min-width:150px;flex:1}
.metric-card .gpu-name{font-size:0.8rem;color:#9ca3af;margin-bottom:4px}
.metric-card .price{font-size:1.5rem;font-weight:700}
.metric-card .change{font-size:0.85rem;margin-top:2px}
.change.down{color:#34d399}.change.up{color:#f87171}
.section-title{font-size:1.2rem;font-weight:600;margin:28px 0 12px}
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:24px}
@media(max-width:900px){.chart-row{grid-template-columns:1fr}}
.controls{background:#1a1c23;border-radius:10px;padding:16px 20px;margin-bottom:20px;display:flex;flex-wrap:wrap;gap:12px;align-items:center}
.controls label{font-size:0.85rem;color:#9ca3af}
.controls select,.controls input{background:#0f1117;color:#fafafa;border:1px solid #333;border-radius:6px;padding:6px 10px;font-size:0.85rem}
.tag{display:inline-block;padding:3px 10px;border-radius:12px;font-size:0.75rem;cursor:pointer;margin:2px;border:1px solid #444;opacity:0.5;transition:opacity 0.2s}
.tag.active{opacity:1;border-color:transparent}
table{width:100%;border-collapse:collapse;font-size:0.85rem}
table th{text-align:left;padding:10px 12px;border-bottom:2px solid #333;color:#9ca3af;font-weight:500}
table td{padding:8px 12px;border-bottom:1px solid #1f2937}
table tr:hover{background:#1a1c23}
</style>
</head>
<body>
<div class="container">
<h1>&#9889; GPU Cloud Pricing Dashboard</h1>
<div class="caption" id="caption"></div>

<div class="controls" id="gpu-selector"></div>
<div class="metrics" id="metrics"></div>

<div class="section-title">Weekly Price Trends</div>
<div id="line-chart" style="height:450px"></div>

<div class="chart-row">
<div>
  <div class="section-title">Current Rates (All GPUs)</div>
  <div id="bar-chart" style="height:600px"></div>
</div>
<div>
  <div class="section-title">Cost Estimates</div>
  <div class="controls" style="margin-bottom:0">
    <label>Duration:</label>
    <select id="duration">
      <option value="1">1 hour</option>
      <option value="8">8 hours</option>
      <option value="24" selected>1 day</option>
      <option value="168">1 week</option>
      <option value="720">1 month</option>
    </select>
  </div>
  <table id="cost-table"><thead><tr><th>GPU</th><th>$/hr</th><th>Cost</th><th>4wk Chg</th></tr></thead><tbody></tbody></table>
</div>
</div>

<div class="section-title">Biggest Price Drops (4 Weeks)</div>
<div id="drops-chart" style="height:350px"></div>
</div>

<script>

 80GB":1.47,"A100 40GB":1.01,"L40S":1.29,"L40":0.75,"RTX 6000 Ada":0.8,"RTX 5090":0.49,"RTX 4090":0.5,"RTX 3090":0.15,"L4":0.45,"A40":0.36,"T4":0.33,"V100":0.23,"AMD MI300X":2.03,"AMD MI325X":2.45}},{"date":"2026-02-02","week":"W06","prices":{"GB300":10.33,"GB200":6.43,"B300":5.12,"B200":4.05,"H200 SXM":4.33,"H100 SXM":3.1,"A100 80GB":1.3,"A100 40GB":1.02,"L40S":1.17,"L40":0.76,"RTX 6000 Ada":0.73,"RTX 5090":0.49,"RTX 4090":0.47,"RTX 3090":0.16,"L4":0.4,"A40":0.34,"T4":0.3,"V100":0.22,"AMD MI300X":2.01,"AMD MI325X":2.48}},{"date":"2026-02-09","week":"W07","prices":{"GB300":10.22,"GB200":6.34,"B300":4.89,"B200":3.95,"H200 SXM":4.27,"H100 SXM":2.94,"A100 80GB":1.23,"A100 40GB":0.94,"L40S":1.26,"L40":0.69,"RTX 6000 Ada":0.74,"RTX 5090":0.46,"RTX 4090":0.42,"RTX 3090":0.15,"L4":0.36,"A40":0.34,"T4":0.29,"V100":0.22,"AMD MI300X":2.04,"AMD MI325X":2.28}},{"date":"2026-02-16","week":"W08","prices":{"GB300":10.21,"GB200":6.29,"B300":4.86,"B200":3.96,"H200 SXM":4.24,"H100 SXM":2.9,"A100 80GB":1.24,"A100 40GB":0.94,"L40S":1.25,"L40":0.65,"RTX 6000 Ada":0.74,"RTX 5090":0.44,"RTX 4090":0.41,"RTX 3090":0.11,"L4":0.34,"A40":0.3,"T4":0.24,"V100":0.25,"AMD MI300X":2.03,"AMD MI325X":2.25}},{"date":"2026-04-01","week":"W14","prices":{"GB300":10.18,"GB200":6.27,"B300":4.81,"B200":3.97,"H200 SXM":4.23,"H100 SXM":2.87,"A100 80GB":1.21,"A100 40GB":0.93,"L40S":1.2,"L40":0.68,"RTX 6000 Ada":0.71,"RTX 5090":0.42,"RTX 4090":0.41,"RTX 3090":0.1,"L4":0.33,"A40":0.31,"T4":0.24,"V100":0.24,"AMD MI300X":2.03,"AMD MI325X":2.22}}]};
const COLORS = {"GB300":"#ff6b6b","GB200":"#ee5a24","B300":"#f368e0","B200":"#be2edd","H200 SXM":"#f43f5e","H100 SXM":"#8b5cf6","A100 80GB":"#3b82f6","A100 40GB":"#06b6d4","L40S":"#10b981","L40":"#2ed573","RTX 6000 Ada":"#ffa502","RTX 5090":"#ff4757","RTX 4090":"#f59e0b","RTX 3090":"#dfe6e9","L4":"#84cc16","A40":"#00d2d3","T4":"#f97316","V100":"#a3a3a3","AMD MI300X":"#e84118","AMD MI325X":"#c23616"};

const entries = DATA.entries;
const gpus = DATA.metadata.tracked_gpus;
const latest = entries[entries.length-1];
const fourWk = entries.length >= 5 ? entries[entries.length-5] : entries[0];

const flagship = ["GB300","GB200","B300","B200","H200 SXM","H100 SXM"];
const mid = ["A100 80GB","A100 40GB","L40S","L40","AMD MI300X","AMD MI325X"];
const budget = ["RTX 6000 Ada","RTX 5090","RTX 4090","RTX 3090","L4","A40","T4","V100"];
const defaultSel = new Set(["H100 SXM","B200","A100 80GB","L40S","RTX 4090","T4"]);
let selected = new Set(defaultSel);

document.getElementById("caption").textContent =
  "Weekly on-demand rates across major providers - " + gpus.length + " GPUs tracked - Last updated " + latest.date;

const plotLayout = {paper_bgcolor:"rgba(0,0,0,0)",plot_bgcolor:"rgba(0,0,0,0)",
  font:{color:"#fafafa"},margin:{l:50,r:20,t:10,b:40},
  xaxis:{gridcolor:"#1f2937",zerolinecolor:"#1f2937"},
  yaxis:{gridcolor:"#1f2937",zerolinecolor:"#1f2937"}};

function buildSelector(){
  var el = document.getElementById("gpu-selector");
  function makeGroup(label, list){
    var h = "<div><label>"+label+":</label><div>";
    list.forEach(function(g){
      var active = selected.has(g);
      h += '<span class="tag '+(active?'active':'')+'" style="background:'+(active?COLORS[g]+'33':'transparent')+';color:'+COLORS[g]+'" data-gpu="'+g+'" onclick="toggleGpu(this)">'+g+'</span>';
    });
    return h + '</div></div>';
  }
  el.innerHTML = makeGroup('Flagship',flagship) + makeGroup('Mid-Tier',mid) + makeGroup('Budget',budget);
}

function toggleGpu(el){
  var g = el.dataset.gpu;
  if(selected.has(g)){selected.delete(g);el.classList.remove('active');el.style.background='transparent';}
  else{selected.add(g);el.classList.add('active');el.style.background=COLORS[g]+'33';}
  render();
}

function render(){
  var mEl = document.getElementById("metrics");
  var mHtml = "";
  Array.from(selected).slice(0,6).forEach(function(gpu){
    var c = latest.prices[gpu]||0;
    var p = fourWk.prices[gpu]||c;
    var ch = p ? ((c-p)/p*100) : 0;
    var cls = ch <= 0 ? "down" : "up";
    mHtml += '<div class="metric-card"><div class="gpu-name">'+gpu+'</div><div class="price">$'+c.toFixed(2)+'/hr</div><div class="change '+cls+'">'+(ch>=0?'+':'')+ch.toFixed(1)+'% (4wk)</div></div>';
  });
  mEl.innerHTML = mHtml;

  var traces = Array.from(selected).map(function(gpu){
    return {
      x: entries.map(function(e){return e.date}),
      y: entries.map(function(e){return e.prices[gpu]}),
      name: gpu, mode:'lines', line:{color:COLORS[gpu],width:2}
    };
  });
  Plotly.react('line-chart', traces, Object.assign({}, plotLayout, {hovermode:'x unified', yaxis:Object.assign({},plotLayout.yaxis,{tickprefix:'$'})}),{responsive:true});
  updateCostTable();
}

function updateCostTable(){
  var hrs = parseInt(document.getElementById("duration").value);
  var tb = document.querySelector("#cost-table tbody");
  tb.innerHTML = gpus.map(function(g){
    var p = latest.prices[g];
    var prev = fourWk.prices[g]||p;
    var ch = prev ? ((p-prev)/prev*100) : 0;
    return '<tr><td style="color:'+COLORS[g]+'">'+g+'</td><td>$'+p.toFixed(2)+'</td><td>$'+(p*hrs).toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2})+'</td><td style="color:'+(ch<=0?'#34d399':'#f87171')+'">'+(ch>=0?'+':'')+ch.toFixed(1)+'%</td></tr>';
  }).join('');
}

var sortedGpus = gpus.slice().sort(function(a,b){return latest.prices[a]-latest.prices[b]});
Plotly.newPlot('bar-chart',[{
  y:sortedGpus, x:sortedGpus.map(function(g){return latest.prices[g]}),
  type:'bar', orientation:'h',
  marker:{color:sortedGpus.map(function(g){return COLORS[g]})}
}],Object.assign({},plotLayout,{showlegend:false, yaxis:Object.assign({},plotLayout.yaxis,{automargin:true}), xaxis:Object.assign({},plotLayout.xaxis,{tickprefix:'$'}), margin:{l:110,r:20,t:10,b:40}}),{responsive:true});

var drops = gpus.map(function(g){
  var p = fourWk.prices[g]||latest.prices[g];
  return {gpu:g, change:((latest.prices[g]-p)/p*100)};
}).sort(function(a,b){return a.change-b.change});
Plotly.newPlot('drops-chart',[{
  x:drops.map(function(d){return d.gpu}), y:drops.map(function(d){return d.change}), type:'bar',
  marker:{color:drops.map(function(d){return d.change<-5?'#34d399':d.change<0?'#fbbf24':'#f87171'})}
}],Object.assign({},plotLayout,{yaxis:Object.assign({},plotLayout.yaxis,{ticksuffix:'%'}), margin:{l:50,r:20,t:10,b:80}, xaxis:Object.assign({},plotLayout.xaxis,{tickangle:-45})}),{responsive:true});

document.getElementById("duration").addEventListener("change", updateCostTable);
buildSelector();
render();
</script>
</body>
</html>
