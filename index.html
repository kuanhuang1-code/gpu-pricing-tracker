<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPU Pricing Tracker</title>
<script src="https://cdn.plot.ly/plotly-2.35.0.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0e1117;color:#e6edf3;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;font-size:16px;line-height:1.6}
.container{max-width:1600px;margin:0 auto;padding:32px 40px}
h1{font-size:2.4rem;font-weight:700;margin-bottom:6px;color:#ffffff}
.caption{color:#8b949e;font-size:1rem;margin-bottom:32px}
h2{font-size:1.5rem;font-weight:600;margin:40px 0 16px;color:#ffffff;border-bottom:2px solid #21262d;padding-bottom:8px}

/* Metric Cards */
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:36px}
.metric-card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:20px 24px}
.metric-card .gpu-name{font-size:0.95rem;color:#8b949e;margin-bottom:6px;font-weight:500}
.metric-card .price{font-size:2rem;font-weight:700;color:#ffffff}
.metric-card .change{font-size:1rem;margin-top:4px;font-weight:600}
.change.down{color:#3fb950}.change.up{color:#f85149}

/* Controls */
.controls{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:20px 24px;margin-bottom:24px;display:flex;flex-wrap:wrap;gap:16px;align-items:center}
.controls label{font-size:1rem;color:#8b949e;font-weight:600}
.controls select{background:#0e1117;color:#e6edf3;border:1px solid #30363d;border-radius:8px;padding:8px 14px;font-size:1rem;cursor:pointer}
.tag{display:inline-block;padding:6px 14px;border-radius:20px;font-size:0.9rem;font-weight:600;cursor:pointer;margin:3px;border:2px solid #30363d;opacity:0.4;transition:all 0.2s}
.tag:hover{opacity:0.7}
.tag.active{opacity:1;border-color:transparent}

/* Tables */
table{width:100%;border-collapse:separate;border-spacing:0;font-size:0.95rem}
table th{text-align:left;padding:14px 16px;border-bottom:2px solid #30363d;color:#8b949e;font-weight:600;font-size:0.9rem;text-transform:uppercase;letter-spacing:0.5px;position:sticky;top:0;background:#0e1117;z-index:1}
table td{padding:12px 16px;border-bottom:1px solid #21262d;font-weight:500}
table tr:hover{background:#161b22}
.price-cell{font-family:'SF Mono',Consolas,monospace;font-weight:600}

/* Week-by-week table */
.weekly-wrapper{overflow-x:auto;border:1px solid #30363d;border-radius:12px;background:#0d1117;max-height:700px;overflow-y:auto}
.weekly-wrapper table{border-spacing:0;min-width:100%}
.weekly-wrapper th{background:#161b22;position:sticky;top:0;z-index:2;white-space:nowrap}
.weekly-wrapper td{white-space:nowrap;text-align:center;font-family:'SF Mono',Consolas,monospace;font-size:0.9rem}
.weekly-wrapper td:first-child,.weekly-wrapper th:first-child{text-align:left;position:sticky;left:0;background:#161b22;z-index:1;min-width:130px;border-right:2px solid #30363d}
.weekly-wrapper th:first-child{z-index:3}
.wk-up{color:#f85149}.wk-down{color:#3fb950}.wk-flat{color:#8b949e}

/* Chart row */
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:32px}
@media(max-width:1000px){.chart-row{grid-template-columns:1fr} .container{padding:20px}}

/* Cost table section */
.cost-section{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:24px;max-height:650px;overflow-y:auto}
</style>
</head>
<body>
<div class="container">

<h1>GPU Cloud Pricing Dashboard</h1>
<div class="caption" id="caption"></div>

<div class="controls" id="gpu-selector"></div>
<div class="metrics" id="metrics"></div>

<h2>Weekly Price Trends</h2>
<div id="line-chart" style="height:520px"></div>

<h2>Week-by-Week Pricing ($/hr)</h2>
<div class="weekly-wrapper" id="weekly-table-wrapper"></div>

<div class="chart-row">
<div>
  <h2>Current Rates (All GPUs)</h2>
  <div id="bar-chart" style="height:650px"></div>
</div>
<div>
  <h2>Cost Estimates</h2>
  <div class="cost-section">
    <div style="margin-bottom:16px">
      <label style="color:#8b949e;font-weight:600;margin-right:12px">Duration:</label>
      <select id="duration" style="background:#0e1117;color:#e6edf3;border:1px solid #30363d;border-radius:8px;padding:8px 14px;font-size:1rem">
        <option value="1">1 hour</option>
        <option value="8">8 hours</option>
        <option value="24" selected>1 day</option>
        <option value="168">1 week</option>
        <option value="720">1 month</option>
      </select>
    </div>
    <table id="cost-table"><thead><tr><th>GPU</th><th>$/hr</th><th>Cost</th><th>4wk Chg</th></tr></thead><tbody></tbody></table>
  </div>
</div>
</div>

<h2>Biggest Price Drops (4 Weeks)</h2>
<div id="drops-chart" style="height:400px"></div>

</div>

var entries = DATA.entries;
var gpus = DATA.metadata.tracked_gpus;
var latest = entries[entries.length-1];
var fourWk = entries.length >= 5 ? entries[entries.length-5] : entries[0];

var flagship = ["GB300","GB200","B300","B200","H200 SXM","H100 SXM"];
var mid = ["A100 80GB","A100 40GB","L40S","L40","AMD MI300X","AMD MI325X"];
var budget = ["RTX 6000 Ada","RTX 5090","RTX 4090","RTX 3090","L4","A40","T4","V100"];
var defaultSel = new Set(["H100 SXM","B200","A100 80GB","L40S","RTX 4090","T4"]);
var selected = new Set(defaultSel);

document.getElementById("caption").textContent =

var plotLayout = {paper_bgcolor:"rgba(0,0,0,0)",plot_bgcolor:"rgba(0,0,0,0)",

function buildSelector(){
  var el = document.getElementById("gpu-selector");
  function makeGroup(label, list){
    var h = "<div style='margin-right:20px'><label>"+label+":</label><div style='margin-top:4px'>";
    list.forEach(function(g){
      var active = selected.has(g);
      h += '<span class="tag '+(active?'active':'')+'" style="background:'+(active?COLORS[g]+'33':'transparent')+';color:'+COLORS[g]+'" data-gpu="'+g+'" onclick="toggleGpu(this)">'+g+'</span>';
    });
    return h + '</div></div>';
  }
  el.innerHTML = makeGroup('Flagship',flagship) + makeGroup('Mid-Tier',mid) + makeGroup('Budget',budget);
}

function toggleGpu(el){
  var g = el.dataset.gpu;
  if(selected.has(g)){selected.delete(g);el.classList.remove('active');el.style.background='transparent';}
  else{selected.add(g);el.classList.add('active');el.style.background=COLORS[g]+'33';}
  render();
}

function buildWeeklyTable(){
  var sel = Array.from(selected);
  var h = '<table><thead><tr><th>GPU</th>';
  entries.forEach(function(e){ h += '<th>'+e.week+'<br><span style="font-size:0.75rem;color:#6e7681">'+e.date.slice(5)+'</span></th>'; });
  h += '</tr></thead><tbody>';
  sel.forEach(function(gpu){
    h += '<tr><td style="color:'+COLORS[gpu]+';font-weight:700">'+gpu+'</td>';
    entries.forEach(function(e,i){
      var p = e.prices[gpu];
      var prev = i > 0 ? entries[i-1].prices[gpu] : p;
      var diff = p - prev;
      var cls = diff < -0.005 ? 'wk-down' : diff > 0.005 ? 'wk-up' : 'wk-flat';
      var arrow = diff < -0.005 ? ' &#9660;' : diff > 0.005 ? ' &#9650;' : '';
      h += '<td class="'+cls+'">$'+p.toFixed(2)+arrow+'</td>';
    });
    h += '</tr>';
  });
  h += '</tbody></table>';
  document.getElementById("weekly-table-wrapper").innerHTML = h;
}

function render(){
  var mEl = document.getElementById("metrics");
  var mHtml = "";
  Array.from(selected).forEach(function(gpu){
    var c = latest.prices[gpu]||0;
    var p = fourWk.prices[gpu]||c;
    var ch = p ? ((c-p)/p*100) : 0;
    var cls = ch <= 0 ? "down" : "up";
    mHtml += '<div class="metric-card"><div class="gpu-name">'+gpu+'</div><div class="price">$'+c.toFixed(2)+'/hr</div><div class="change '+cls+'">'+(ch>=0?'+':'')+ch.toFixed(1)+'% (4wk)</div></div>';
  });
  mEl.innerHTML = mHtml;

  var traces = Array.from(selected).map(function(gpu){
    return {
      x: entries.map(function(e){return e.date}),
      y: entries.map(function(e){return e.prices[gpu]}),
      name: gpu, mode:'lines+markers',
      line:{color:COLORS[gpu],width:3},
      marker:{size:7,color:COLORS[gpu]}
    };
  });
  Plotly.react('line-chart', traces, Object.assign({}, plotLayout, {
    hovermode:'x unified',
    yaxis:Object.assign({},plotLayout.yaxis,{tickprefix:'$',tickfont:{size:14}}),
    xaxis:Object.assign({},plotLayout.xaxis,{tickfont:{size:13},dtick:604800000,tickformat:'%b %d'}),
    legend:{font:{size:14},bgcolor:'rgba(0,0,0,0)'}
  }),{responsive:true});

  buildWeeklyTable();
  updateCostTable();
}

function updateCostTable(){
  var hrs = parseInt(document.getElementById("duration").value);
  var tb = document.querySelector("#cost-table tbody");
  tb.innerHTML = gpus.map(function(g){
    var p = latest.prices[g];
    var prev = fourWk.prices[g]||p;
    var ch = prev ? ((p-prev)/prev*100) : 0;
    return '<tr><td style="color:'+COLORS[g]+';font-weight:700">'+g+'</td><td class="price-cell">$'+p.toFixed(2)+'</td><td class="price-cell">$'+(p*hrs).toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2})+'</td><td style="color:'+(ch<=0?'#3fb950':'#f85149')+';font-weight:600">'+(ch>=0?'+':'')+ch.toFixed(1)+'%</td></tr>';
  }).join('');
}

var sortedGpus = gpus.slice().sort(function(a,b){return latest.prices[a]-latest.prices[b]});
Plotly.newPlot('bar-chart',[{
  y:sortedGpus, x:sortedGpus.map(function(g){return latest.prices[g]}),
  type:'bar', orientation:'h',
  marker:{color:sortedGpus.map(function(g){return COLORS[g]})},
  text:sortedGpus.map(function(g){return '$'+latest.prices[g].toFixed(2)}),
  textposition:'outside', textfont:{color:'#e6edf3',size:13}
}],Object.assign({},plotLayout,{showlegend:false, yaxis:Object.assign({},plotLayout.yaxis,{automargin:true,tickfont:{size:14}}), xaxis:Object.assign({},plotLayout.xaxis,{tickprefix:'$',tickfont:{size:13}}), margin:{l:120,r:60,t:10,b:40}}),{responsive:true});

var drops = gpus.map(function(g){
  var p = fourWk.prices[g]||latest.prices[g];
  return {gpu:g, change:((latest.prices[g]-p)/p*100)};
}).sort(function(a,b){return a.change-b.change});
Plotly.newPlot('drops-chart',[{
  x:drops.map(function(d){return d.gpu}), y:drops.map(function(d){return d.change}), type:'bar',
  marker:{color:drops.map(function(d){return d.change<-5?'#3fb950':d.change<0?'#fbbf24':'#f85149'})},
  text:drops.map(function(d){return (d.change>=0?'+':'')+d.change.toFixed(1)+'%'}),
  textposition:'outside', textfont:{color:'#e6edf3',size:12}
}],Object.assign({},plotLayout,{yaxis:Object.assign({},plotLayout.yaxis,{ticksuffix:'%',tickfont:{size:13}}), margin:{l:60,r:20,t:30,b:100}, xaxis:Object.assign({},plotLayout.xaxis,{tickangle:-45,tickfont:{size:13}})}),{responsive:true});

document.getElementById("duration").addEventListener("change", updateCostTable);
buildSelector();
render();
</script>
